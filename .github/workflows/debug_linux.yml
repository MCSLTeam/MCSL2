################################################################################
name: Linux Debug Build

on: workflow_dispatch

jobs:
  Linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: ubuntu-22.04
            experimental: false
            skip_pyqt_qt5_wheel: false
            use_upx: true
          - architecture: arm64
            runner: ubuntu-22.04-arm
            experimental: true
            skip_pyqt_qt5_wheel: true
            use_upx: false
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    steps:

      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          if [ "${{ matrix.skip_pyqt_qt5_wheel }}" = "true" ]; then
            sudo apt-get install -y libqt5core5a libqt5dbus5 libqt5gui5 libqt5network5 libqt5printsupport5 libqt5svg5 libqt5widgets5 libqt5xml5 qtbase5-dev qtbase5-dev-tools qt5-qmake libqt5svg5-dev qtwayland5
          fi
 
      - name: Checkout Repo
        uses: actions/checkout@v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python
        run: uv python install 3.8

      - name: Sync Dependencies
        run: |
          sync_args="${{ matrix.skip_pyqt_qt5_wheel && '--no-install-package pyqt5-qt5' || '' }}"
          if [ "${{ matrix.skip_pyqt_qt5_wheel }}" = "true" ]; then
            uv sync --no-dev --locked $sync_args &
            sync_pid=$!
            while kill -0 "$sync_pid" 2>/dev/null; do
              echo "Still syncing dependencies for Linux arm64..."
              sleep 60
            done
            wait "$sync_pid"
          else
            uv sync --no-dev --locked
          fi

      - name: Build
        run: |
          uv run deploy.py

      - name: Optimize
        run: |
          dist="build/MCSL2.dist"
          rm -rf \
            "$dist/zstandard" \
            "$dist/_asyncio"* \
            "$dist/pyexpat"* \
            "$dist/libQt5Quick.so.5" \
            "$dist/libQt5Qml.so.5" \
            "$dist/libQt5QmlModels.so.5"

          if [ "${{ matrix.use_upx }}" = "true" ] && [ -f "$dist/MCSL2.bin" ]; then
            chmod +x ./upx
            ./upx -9 "$dist/MCSL2.bin"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: MCSL2-Linux-${{ matrix.architecture }}
          path: |
            build/MCSL2.dist/**/*
