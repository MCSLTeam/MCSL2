################################################################################
name: Windows Debug Build

on: workflow_dispatch

jobs:
  Windows:
    strategy:
      fail-fast: false
      matrix:
        include:
          - architecture: x64
            runner: windows-2022
            experimental: false
            skip_arm64_missing_wheels: false
            use_upx: true
          - architecture: arm64
            runner: windows-11-arm
            experimental: true
            skip_arm64_missing_wheels: true
            use_upx: false
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.experimental }}
    steps:

      - name: Checkout Repo
        uses: actions/checkout@v6.0.3

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python
        run: uv python install 3.8

      - name: Sync Dependencies
        shell: pwsh
        run: uv sync --no-dev --locked ${{ matrix.skip_arm64_missing_wheels && '--no-install-package pyqt5-qt5 --no-install-package pywin32' || '' }}

      - name: Build
        run: |
          uv run deploy.py --windows-console-mode=disable

      - name: Optimize
        shell: pwsh
        run: |
          $dist = "build/MCSL2.dist"
          $removePaths = @(
            "zstandard",
            "_asyncio.pyd",
            "pyexpat.pyd",
            "qt5qml.dll",
            "qt5qmlmodels.dll",
            "qt5quick.dll"
          )
          foreach ($path in $removePaths) {
            Remove-Item -Force -Recurse "$dist/$path" -ErrorAction SilentlyContinue
          }

          $upxTargets = @(
            "_ctypes.pyd",
            "_decimal.pyd",
            "_elementtree.pyd",
            "_lzma.pyd",
            "_overlapped.pyd",
            "_socket.pyd",
            "_ssl.pyd",
            "_win32sysloader.pyd",
            "libffi-7.dll",
            "libcrypto-1_1.dll",
            "libssl-1_1.dll",
            "MCSL2.exe",
            "python38.dll",
            "pythoncom38.dll",
            "pywintypes38.dll",
            "qt5core.dll",
            "qt5dbus.dll",
            "qt5gui.dll",
            "qt5multimedia.dll",
            "qt5network.dll",
            "qt5printsupport.dll",
            "qt5svg.dll",
            "qt5websockets.dll",
            "qt5widgets.dll",
            "qt5xml.dll",
            "select.pyd",
            "unicodedata.pyd",
            "win32api.pyd",
            "win32gui.pyd",
            "win32print.pyd"
          ) | ForEach-Object { "$dist/$_" } | Where-Object { Test-Path $_ }

          if ("${{ matrix.use_upx }}" -eq "true" -and $upxTargets.Count -gt 0) {
            .\upx.exe -9 $upxTargets
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: MCSL2-Windows-${{ matrix.architecture }}
          path: |
            build/MCSL2.dist/**/*
